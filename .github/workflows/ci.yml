name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests (pytest)
        run: pytest

  codeql:
    name: CodeQL security scan
    # CodeQL code scanning needs a public repo (or GitHub Advanced Security), so
    # we skip it while the repo is private and let it activate automatically once
    # the repo is made public.
    if: ${{ github.event.repository.visibility == 'public' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      # A CodeQL scan is two steps: `init` builds the database, `analyze` queries
      # it. The prototype called `analyze` alone (with no `init`), so it could
      # never run. Both actions are pinned to the current major, v3.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
